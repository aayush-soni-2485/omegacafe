<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omega Cafe</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Verdana, sans-serif;
}

/* Background Image */
body {
    {% comment %} background-image: url("https://www.shutterstock.com/image-photo/beautiful-natural-wooden-table-coffee-600nw-2638582873.jpg"); {% endcomment %}
    background-color: #8ea727;
    background-repeat: no-repeat;
    background-position: center;
    background-size: cover;
    min-height: 100vh;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10, 7, 7, 0.98);
    padding: 15px 20px;
    position: sticky;
    top: 0;
}

.logo {
    color: white;
    font-size: 22px;
}

/* Nav Links */
.nav-links {
    display: flex;
    gap: 20px;
}

.nav-links a {
    color: white;
    text-decoration: none;
    font-size: 16px;
    transition: 0.3s;
}

.nav-links a:hover {
    color: orange;
}

/* Mobile Menu */
.menu-btn {
    display: none;
    font-size: 26px;
    color: white;
    cursor: pointer;
}

/* Responsive */
@media (max-width: 768px) {
    .nav-links {
        display: none;
        flex-direction: column;
        background: rgba(0,0,0,0.9);
        position: absolute;
        top: 60px;
        right: 0;
        width: 200px;
        padding: 15px;
    }

    .nav-links.active {
        display: flex;
    }

    .menu-btn {
        display: block;
    }
}

/* Hero */
.hero {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
    color: white;
    text-align: center;
}

.hero h1 {
    font-size: 50px;
    text-shadow: 2px 2px 5px black;
}

/* ================= FOOTER ================= */
.footer {
    background: rgba(0,0,0,0.95);
    color: white;
    padding: 40px 20px;
    margin-top: 50px;
}

.footer-container {
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    gap: 20px;
}

.footer-box {
    max-width: 250px;
}

.footer-box h3 {
    margin-bottom: 10px;
    color: orange;
}

.footer-box a {
    display: block;
    color: white;
    text-decoration: none;
    margin: 5px 0;
    transition: 0.3s;
}

.footer-box a:hover {
    color: orange;
}

/* Bottom Text */
.footer-bottom {
    text-align: center;
    margin-top: 20px;
    border-top: 1px solid gray;
    padding-top: 10px;
    font-size: 14px;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <div class="logo">OMEGA CAFE</div>

    <div class="menu-btn" onclick="toggleMenu()">☰</div>

    <div class="nav-links" id="navLinks">
        <a href="/">Home</a>
        <a href="/orders/">Orders</a>
        <a href="/about/">About Us</a>
    </div>
</div>

<!-- Hero Section -->
<div class="hero">
    <h1>Welcome to Omega Cafe</h1>
</div>

<!-- ================= FOOTER ================= -->
<footer class="footer">

    <div class="footer-container">

        <!-- About -->
        <div class="footer-box">
            <h3>Omega Cafe</h3>
            <p>Best cafe in Ahmedabad. Fresh coffee, snacks & fast service.</p>
        </div>

        <!-- Links -->
        <div class="footer-box">
            <h3>Quick Links</h3>
            <a href="/">Home</a>
            <a href="/orders/">Orders</a>
            <a href="/about/">About Us</a>
        </div>

        <!-- Contact -->
        <div class="footer-box">
            <h3>Contact</h3>
            <p>📍 Ahmedabad, India</p>
            <p>📞 +91 7600 912491</p>
            <p>✉ info@omegacafe.com</p>
        </div>

    </div>

    <div class="footer-bottom">
        © 2026 Omega Cafe | All Rights Reserved
    </div>

</footer>

<script>
function toggleMenu() {
    document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>

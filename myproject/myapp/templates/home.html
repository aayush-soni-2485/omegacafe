<!DOCTYPE html>
<html>
<head>
    <title>Omega Cafe</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="padding-top:70px;">

<!-- ================= NAVBAR ================= -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container-fluid">

    <a class="navbar-brand" href="/" style="font-family: verdana;">OMEGA CAFE</a>

    <!-- TOGGLE BUTTON -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- NAV LINKS -->
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link active" href="/">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/orders/">Orders</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/about/">About</a>
        </li>

      </ul>
    </div>

  </div>
</nav>

<!-- ================= ITEMS ================= -->
<div class="container mt-4">

<h1 class="text-center mb-3 mt-1">Our Menu</h1>

<div class="row">

{% for item in items %}

  <div class="col-md-4">

    <div class="card mb-3 shadow">

      <!-- IMAGE -->
      {% if item.image %}
        <img src="{{ item.image.url }}" class="card-img-top" style="height:200px; object-fit:cover;">
      {% endif %}

      <div class="card-body text-center">

        <!-- NAME -->
        <h5 class="card-title">{{ item.name }}</h5>

        <!-- PRICE -->
        <p class="card-text">Price: ₹{{ item.price }}</p>

        <!-- ADD TO CART -->
        <form method="POST" action="/add-to-cart/">
            {% csrf_token %}
            <input type="hidden" name="item_id" value="{{ item.id }}">
            <button class="btn btn-success w-100">Add to Cart</button>
        </form>
        
      </div>

    </div>

  </div>

{% endfor %}

</div>
</div>

<!-- ================= BOOTSTRAP JS (IMPORTANT) ================= -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
